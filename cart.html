<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - DENVER.CO</title>

  <!-- GOOGLE FONTS -->
  <!-- DM Serif Display -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <!-- Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="assets/css/header.css">
  <link rel="stylesheet" href="assets/css/footer.css">
  <link rel="stylesheet" href="assets/css/cart.css">
</head>

<body>
  <!----- HEADER ----->
  <header>
    <a href="shop.html" class="nav-left shop-link-header">
      <div class="shop-header">
        SHOP
      </div>
    </a>

    <a href="index.html" class="nav-inner logo-link-header">
      <div class="logo-header">
        DENVER.CO
      </div>
    </a>
    <a href="cart.html" class="nav-inner">
      <img src="assets/images/icons/cart-icon.svg" class="cart-link-header">
    </a>
    <div class="nav-right">
      <img src="assets/images/icons/account-icon.svg" class="account-link-header">
    </div>
  </header>

  <!----- MAIN ----->
  <main>
    <!----- EMPTY CART DISPLAY ----->
    <div class="js-empty-cart-container"></div>

    <!----- CART WITH PRODUCT DISPLAY ----->
    <div class="js-cart-title"></div>
    <div class="js-products-grid"></div>
    <div class="js-order-summary-container"></div>
  </main>

  <!----- FOOTER ----->
  <footer>
    <div class="sections">
      <div class="section-1">
        <h3 class="shop-section-footer">
          SHOP
        </h3>
        <p class="shop-section">
          All
        </p>
        <p class="shop-section">
          Tees
        </p>
        <p class="shop-section">
          Bottoms
        </p>
        <p class="shop-section">
          Outerwear
        </p>
        <p class="shop-section">
          Headwear
        </p>
      </div>

      <div class="section-2">
        <h3 class="brand-section-footer">
          BRAND
        </h3>
        <p class="brand-section">
          About
        </p>
        <p class="brand-section">
          Contact
        </p>
        <p class="brand-section">
          Size Guide
        </p>
        <p class="brand-section">
          Privacy Policy
        </p>
        <p class="brand-section">
          Terms & Conditions
        </p>
        <p class="brand-section">
          Returns
        </p>
        <p class="brand-section">
          Track an Order
        </p>
      </div>

      <div class="section-3">
        <h3 class="socials-section-footer">
          SOCIALS
        </h3>
        <p class="socials-section">
          Facebook
        </p>
        <p class="socials-section">
          Instagram
        </p>
        <p class="socials-section">
          X
        </p>
        <p class="socials-section">
          Linkedin
        </p>
        <p class="socials-section">
          Youtube
        </p>
      </div>
    </div>
    <div class="logo-footer">
      DENVER.CO
    </div>
  </footer>

  <script type="module" src="assets/js/cart.js"></script>

</html>
